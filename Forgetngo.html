<html>
<head>
    <title>Forgot Password</title>
    <style>
        body {
background-image: url('https://img.freepik.com/premium-vector/young-volunteer-with-food-donation-boxes-concept-illustrations-food-donation-concept-with-character-can-use-web-banner-infographics-hero-images_106796-258.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            font-family: Arial, sans-serif;
     
            text-align: center; /* Centers the text on the whole page */
            padding-top: 100px; /* Pushes the box down from the top */
        }

        .simple-box {
            background-color: rgba(200,200,200,0.9);	
            width: 300px; /* Fixed width to keep it small */
            margin: 0 auto; /* Centers the box itself in the middle of the screen */
            padding: 30px;
            border: 2px solid #000000; /* Simple black border */
            border-radius: 10px; /* Rounded corners */
        }
        input[type="email"] {
            width: 90%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #000000;
            border-radius: 5px;
        }


        button {
            width: 95%;
            padding: 10px;
            background-color: #000000; /*  color */
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }


        .links {
            margin-top: 15px;
            font-size: 14px;
        }

        .links a {
            color: #000000;
            text-decoration: none; /* Removes the underline */
        }
    </style>
</head>
<body>

    <div class="simple-box">
        <h2 style="color: #000000; margin-top: 0;">Forgot Password</h2>
        <p style="font-size: 14px; color: #000000;">Enter your email and we will send you a reset link.</p>
        
        <form>
            <input type="email" placeholder="Enter your email" required>
            <br>
            <button type="submit">Send Link</button>
        </form>

        <div class="links">
            <a href="login11.html">Go back to Login</a>
        </div>
    </div>

</body>
</html>
