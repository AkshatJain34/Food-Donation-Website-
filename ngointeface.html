<!DOCTYPE html>
<html>
<head>
    <title>NGO Dashboard - Donations</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('https://media.istockphoto.com/id/1700728948/photo/poor-wheelchair-user-receiving-free-food.jpg?s=612x612&w=0&k=20&c=HXfCghqpyQGtbg9FVBLuGIGMjfeaSs1PYVpLYJLz6AU=');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 50px 20px;
        }

        .table-container {
            background-color: rgba(240, 240, 240, 0.95);
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px;
            border: 2px solid #28a745;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        h2 {
            color: #28a745;
            text-align: center;
            margin-top: 0;
            font-size: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: white;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 12px 15px;
            text-align: left;
        }

        th {
            background-color: #28a745;
            color: white;
            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: #f4f4f4;
        }

        tr:hover {
            background-color: #e9ecef;
        }
    </style>
</head>
<body>

    <div class="table-container">
        <h2>Incoming Food Donations</h2>
        
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Address</th>
                    <th>Phone Number</th>
                    <th>Items</th>
                    <th>Quantity</th>
                    <th>claim</th>
                </tr>
            </thead>
        </table>

    </div>

</body>
</html>
