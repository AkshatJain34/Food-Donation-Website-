
<html>
<head>
    <title>Donation Successful</title>
    <style>
        /* 1. Basic background and font */
        body {
 background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRYgbRXD0ZZ6gpLSbvCRbYjXdjsZVk4imaGBA&s');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding-top: 80px; /* Pushed down a bit more to center it nicely */
        }

        /* 2. The main white success box */
        .thankyou-box {
            background-color: white;
            width: 350px;
            margin: 0 auto;
            padding: 40px 30px; /* Extra padding to make it look spacious */
            border: 2px solid #28a745; /* Green border */
            border-radius: 10px;
        }

        /* 3. The big green checkmark */
        .checkmark {
            font-size: 60px;
            color: #28a745;
            margin-bottom: 10px;
        }

        /* 4. Text styling */
        h2 {
            color: #28a745;
            margin-top: 0;
            margin-bottom: 10px;
        }

        p {
            font-size: 15px;
            color: #555;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        /* 5. The return button (which is actually a link) */
        .home-btn {
            display: inline-block;
            width: 90%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            text-decoration: none; /* Removes the underline from the link */
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
        }

        .home-btn:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="thankyou-box">
        <div class="checkmark">✔️</div>
        
        <h2>Thank You!</h2>
        <p>Your food donation details have been successfully received. An NGO from our network will contact you shortly for the pickup.</p>
        
        <a href="front.html" class="home-btn" style="display:inline-block; background:#28a745; color:white; padding:10px 20px; text-decoration:none; border-radius:5px; font-weight:bold;">Return to Home</a>
    </div>

</body>
</html>
